services:
  postgres:
    image: postgres:16
    container_name: homematch_db
    environment:
      POSTGRES_USER: homematch
      POSTGRES_PASSWORD: homematch123
      POSTGRES_DB: homematch_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: homematch_backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://homematch:homematch123@postgres:5432/homematch_db
      SECRET_KEY: supersecretkey123homematch
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
    depends_on:
      - postgres
    volumes:
      - ./backend:/app

  ml-service:
    build: ./ml-service
    container_name: homematch_ml
    ports:
      - "8001:8001"
    environment:
      ML_DATABASE_URL: postgresql://homematch:homematch123@postgres:5432/homematch_db
    depends_on:
      - postgres
    volumes:
      - ./ml-service:/app

volumes:
  postgres_data: